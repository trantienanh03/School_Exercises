<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .wrapper {
            background-color: #fff;
            padding: 30px;
            border-radius: 5px;
            max-width: 600px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #8BC34A;
            font-weight: bold;
        }

        .form-group {
            position: relative;
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 40px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .icon, .fa-credit-card {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 20px;
        }

        .left, .right {
            width: 50%;
        }

        .row button {
            width: 45%;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            border: 1px solid #ddd;
            background-color: white;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        button:hover {
            background-color: #8BC34A;
            color: #fff;
        }
        .payment-detail .form-group {
            display: flex;
        }

        .payment-detail button {
            flex: 1;
        }

        .last-element {
            display: flex;
            gap: 10px;
        }

        .date {
            display: flex;
            justify-content: space-between;
        }

        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
        }
        .footer {
            margin-top: 30px;
        }
        h3 {
            margin-bottom: 30px;
            color: #8BC34A;
        }
        .acceptedTerm {
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <div class="contact-form">
            <form>
                <div class="account-group">
                    <label>Account</label>
                    <div class="form-group">
                        <i class="fas fa-user icon"></i>
                        <input type="text" placeholder="Full Name">
                    </div>
                    <div class="form-group">
                        <i class="fas fa-envelope icon"></i>
                        <input type="text" placeholder="Email Address">

                    </div>
                    <div class="form-group">
                        <i class="fas fa-key icon"></i>
                        <input type="text" placeholder="Password">
                    </div>
                </div>
                <div class="row">
                    <div class="left">
                        <label>Date of Birth</label>
                        <input type="date">
                    </div>
                    <div class="right">
                        <label>Gender</label>
                        <button type="button">Male</button>
                        <button type="button">Female</button>
                    </div>
                </div>
                <div class="payment-detail">
                    <label>Payment Details</label>
                    <div class="form-group">
                        <button type="button">Credit Card</button>
                        <button type="button">Paypal</button>
                    </div>
                </div>
                <div class="card-number">
                    <div class="form-group">
                        <i class="fa-regular fa-credit-card"></i>
                        <input type="text" placeholder="Card Number">
                    </div>
                </div>
                <div class="last-element">
                    <div class="form-group">
                        <i class="fas fa-user icon"></i>
                        <input type="text" id="cardCVC" placeholder="Card CVC">
                    </div>
                    <div class="date">
                        <select style="width: fit-content;">
                            <option>01 Jan</option>
                        </select>
                        <select style="width: fit-content;">
                            <option>2015</option>
                        </select>
                    </div>
                </div>
            </form>
            <div class="footer">
                <h3>Terms and Conditions</h3>
                <div class="acceptedTerm">
                    <input type="checkbox">
                    <p>I accept the terms and conditions for signing up to this device,
                        and hereby confirm I have read the privacy policy</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
