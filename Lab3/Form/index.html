<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <style>
        * {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .wrapper {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-form {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 600px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        .form-group label {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 10px;
            color: gray;
        }

        input, select, textarea {
            width: 100%;
            padding: 20px 10px 10px;
            border: none;
            background-color: #eee;
            border-radius: 10px;
            font-size: 14px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row > div {
            flex: 1;
        }

        textarea {
            height: 200px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="contact-form">
        <h1>Contact Us</h1>
        <form>
            <div class="form-group">
                <input type="text" id="fullname" placeholder="Enter Your Name" required>
                <label for="fullname">FULL NAME *</label>
            </div>
            <div class="row">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Enter Your Email" required>
                    <label for="email">EMAIL *</label>
                </div>
                <div class="form-group">
                    <input type="tel" id="tel" placeholder="Enter Number Phone">
                    <label for="tel">PHONE</label>
                </div>
            </div>
            <div class="form-group">
                <select id="services" required>
                    <option value="" disabled selected>Please chooses</option>
                    <option value="service1">Service 1</option>
                    <option value="service2">Service 2</option>
                    <option value="service3">Service 3</option>
                </select>
                <label for="services">NEEDED SERVICES *</label>
            </div>
            <div class="form-group">
                <textarea id="message" placeholder="Your message here..." rows="4"></textarea>
                <label for="message">MESSAGE</label>
            </div>
            <button type="submit">Submit →</button>
        </form>
    </div>
</div>
</body>
</html>
