<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            width: 1200px;
            margin: 0 auto;
        }
        .wrapper {
            margin-top: 10px;
        }
        .header, .nav, .footer {
            border: 1px solid #000;
            padding: 20px;
        }
        .content {
            display: flex;
            height: 300px;
        }
        .content .left {
            border: 1px solid #000;
            flex-basis: 30%;
            padding: 20px;
        }
        .content .right {
            border: 1px solid #000;
            flex-basis: 70%;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>HEADER SECTION</h1>
            </div>
            <div class="nav">
                <h1>NAVIGATION BAR</h1>
            </div>
            <div class="content">
                <div class="left">
                    <h1>Index</h1>
                </div>
                <div class="right">
                    <h1>Content section</h1>
                </div>
            </div>
            <div class="footer">
                <h1>FOOTER SECTION</h1>
            </div>
        </div>
    </div>
</body>
</html>
