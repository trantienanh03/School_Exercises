<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            width: 900px;
            margin: 0 auto;
        }

        .header {
            background-color: #c79b67;
            width: 900px;
            height: 120px;
            padding: 20px;
        }

        .company-image {
            background-color: #a9a9a9;
            width: 900px;
            height: 400px;
            padding: 20px;
            position: relative;
        }

        .company-image h2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
        }

        .services {
            width: 900px;
        }

        .services h2 {
            margin: 30px;
        }

        .service-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 0 auto;
        }

        .service-box {
            background-color: #a9a9a9;
            width: 280px;
            height: 220px;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .footer {
            background-color: #2c3e50;
            width: 900px;
            height: 120px;
            padding: 20px;
            color: white;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <div class="header">
            <h1>Header section</h1>
        </div>
        <div class="company-image">
            <h2>Company Image</h2>
        </div>
        <div class="services">
            <h2>Our Services</h2>
            <div class="service-container">
                <div class="service-box">services<br></div>
                <div class="service-box">services<br></div>
                <div class="service-box">services<br></div>
                <div class="service-box">services<br></div>
                <div class="service-box">services<br></div>
                <div class="service-box">services<br></div>
            </div>
        </div>
        <div class="footer">
            <h1>Footer section</h1>
        </div>
    </div>
</div>
</body>
</html>
