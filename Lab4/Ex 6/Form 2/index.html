<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
          integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        * {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        .wrapper {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-form {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }

        h1 {
            font-size: 24px;
            margin: 40px 0;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 10px;
            color: gray;
        }

        input {
            width: 100%;
            padding: 20px 10px 10px;
            border: none;
            background-color: #eee;
            border-radius: 10px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #555;
        }

        .or-login-with {
            text-align: center;
            margin-top: 100px;
            color: #888;
            font-size: 12px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            gap: 10px;
        }

        .social-login button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e0e0e0;
            background-color: white;
            color: #333;
            font-size: 18px;
            cursor: pointer;
        }

        .sign-up {
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="contact-form">
        <h1>Sign in</h1>
        <form id="myForm">
            <div class="form-group">
                <input type="text" id="user-name" autofocus required>
                <label for="user-name">username or email</label>
            </div>
            <div class="form-group">
                <input type="password" id="password" required>
                <label for="password">password</label>
            </div>
            <button type="submit">SIGN IN</button>
        </form>
        <div class="or-login-with">Or login with</div>
        <div class="social-login">
            <button type="button" title="Login with Facebook">
                <i class="fab fa-facebook-f"></i>
            </button>
            <button type="button" title="Login with Google">
                <i class="fa-brands fa-google"></i>
            </button>
        </div>
        <div class="sign-up">Sign Up</div>
    </div>
</div>
</body>
</html>
