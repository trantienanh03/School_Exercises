<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #eee;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
        }

        textarea {
            margin-top: 10px;
            width: 100%;
            height: 200px;
            padding: 10px;
            border-radius: 10px;
            font-size: 1em;
        }

        input[type="text"] {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 10px 30px;
            border-radius: 10px;
            background-color: #2dc0e8;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        button:hover {
            background-color: #2c3e50;
        }

        .result {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <h1>Đếm số lần xuất hiện của từ</h1>
        <div class="input-group">
            <label for="textArea">Nhập đoạn văn bản:</label>
            <textarea id="textArea" placeholder="Nhập đoạn văn bản của bạn vào đây..."></textarea>
        </div>
        <div class="input-group">
            <label for="text">Nhập từ:</label>
            <input type="text" id="text" placeholder="Nhập từ bạn cần đếm vào đây...">
        </div>
        <button onclick="countOccurs()">Đếm số lần xuất hiện</button>
        <div class="result">
            <h2>Kết quả: </h2>
            <p id="res"></p>
        </div>
    </div>
</div>
<script>
    function countOccurs() {
        const textArea = document.getElementById("textArea").value;
        const searchText = document.getElementById("text").value;
        const result = document.getElementById("res");

        const regex = new RegExp(searchText, 'gi');
        const matches = textArea.match(regex);
        const count = matches ? matches.length : 0;

        document.getElementById("res").textContent = `Số lần xuất hiện của "${searchText}" trong đoạn văn là: ${count}`;
    }
</script>
</body>
</html>
